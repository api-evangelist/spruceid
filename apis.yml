name: SpruceID
description: >-
  SpruceID is a decentralized identity company providing open-source tools and
  infrastructure for governments and enterprises to issue, verify, and manage
  digital identity credentials. Their platform supports W3C Verifiable
  Credentials, Decentralized Identifiers (DIDs), OpenID for Verifiable
  Credential Issuance (OID4VCI), OpenID for Verifiable Presentations (OID4VP),
  Sign-In with Ethereum (SIWE), and ISO/IEC 18013-5 mobile driver's licenses
  (mDL). SpruceID's SpruceKit toolkit enables developers to build wallet apps,
  credential issuers, and verifier integrations using standards-based identity
  protocols.
image: https://spruceid.com/favicon.ico
tags:
  - Decentralized Identity
  - Verifiable Credentials
  - DIDs
  - Sign-In with Ethereum
  - Identity Wallet
  - Government
  - OpenID Connect
  - W3C Standards
created: '2026-06-14'
modified: '2026-06-14'
